<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-icon name="settings-outline" size="large" style="margin-left: 12px; color: white;"></ion-icon>
    </ion-buttons>
    <ion-title>Opciones del Sistema</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="bienvenida">
    <h2>Bienvenido 👋</h2>
    <p>Restaurante GIOS</p>
  </div>

  <ion-button expand="block" routerLink="/stock" color="primary" class="menu-btn">
    <ion-icon name="cube-outline" slot="start"></ion-icon>
    Stock
  </ion-button>

  <ion-button expand="block" routerLink="/registro-insumo" color="success" class="menu-btn">
    <ion-icon name="add-circle-outline" slot="start"></ion-icon>
    Registro Insumo
  </ion-button>

  <ion-button *ngIf="esAdmin" expand="block" routerLink="/registro-usuario" color="warning" class="menu-btn">
    <ion-icon name="person-add-outline" slot="start"></ion-icon>
    Registro Usuarios
  </ion-button>

  <ion-button expand="block" routerLink="/alertas" color="danger" class="menu-btn">
    <ion-icon name="warning-outline" slot="start"></ion-icon>
    Alertas
  </ion-button>

  <ion-button expand="block" routerLink="/reportes" color="tertiary" class="menu-btn">
    <ion-icon name="bar-chart-outline" slot="start"></ion-icon>
    Reportes
  </ion-button>

  <ion-button *ngIf="esAdmin" expand="block" routerLink="/ver-usuarios" color="medium" class="menu-btn">
    <ion-icon name="people-outline" slot="start"></ion-icon>
    Ver Usuarios
  </ion-button>

</ion-content>
